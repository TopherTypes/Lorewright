<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorewright</title>

  <!-- Fantasy typography: Cinzel (display/titles) + Lora (humanist serif body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- UI styles (screen only) -->
  <link rel="stylesheet" href="./styles/ui/main.css" />

  <!-- Print stylesheets — always loaded;
       @media print rules isolate them from screen rendering -->
  <link rel="stylesheet" href="./styles/print/creature-card.css" />
  <link rel="stylesheet" href="./styles/print/item-card.css" />

  <!-- Import map: resolves the bare 'jspdf' specifier when source is served
       directly without a bundler (e.g. GitHub Pages from repo root).
       Vite's production build bundles jspdf from node_modules instead and
       never consults this map, so it is safe to include in both environments. -->
  <script type="importmap">
  {
    "imports": {
      "jspdf": "https://cdn.jsdelivr.net/npm/jspdf@4.2.1/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
